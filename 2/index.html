<html>
  <body>
    <script src="https://js.puter.com/v2/"></script>
    <script>
      async function streamClaudeResponse() {
        const response = await puter.ai.chat(
          "Create a ninjascript indicator that shows the US economic calendar that spans three days, the last trading day, current trading day and next trading day. It should only show high priority data releases. It should be colored in yellow and have parameters that allow for color change, days back and days forward of the calendar to show. Show the code correctly indented so it appear correctly in a html file.",
          { model: "claude-3-7-sonnet", stream: true },
        );

        for await (const part of response) {
          puter.print(part?.text);
        }
      }

      streamClaudeResponse();
    </script>
  </body>
</html>
